<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="收集和分享演唱会的精彩瞬间">
  <title>🎵 演唱会记忆收集站</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
  <!-- 动态背景光效 -->
  <div class="bg-lights">
    <div class="light light-1"></div>
    <div class="light light-2"></div>
    <div class="light light-3"></div>
  </div>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎵</span>
        <div>
          <h1 class="logo-title">演唱会记忆收集站</h1>
          <p class="logo-subtitle">记录每一个闪耀瞬间</p>
        </div>
      </div>
      <div class="stats-bar" id="statsBar">
        <div class="stat-item">
          <span class="stat-num" id="photoCount">0</span>
          <span class="stat-label">照片</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="videoCount">0</span>
          <span class="stat-label">视频</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="totalSize">0 MB</span>
          <span class="stat-label">总大小</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main">
    <!-- 上传区域 -->
    <section class="upload-section">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h2 class="upload-title">拖拽照片/视频到这里</h2>
        <p class="upload-hint">或者 <span class="upload-link">点击选择文件</span></p>
        <p class="upload-formats">支持 JPG / PNG / GIF / WEBP / MP4 / MOV / WEBM 等格式，单个文件最大 100MB</p>
        <input type="file" id="fileInput" multiple accept="image/*,video/*" hidden>
      </div>
      <!-- 上传进度 -->
      <div class="upload-progress-container" id="uploadProgress" style="display:none;">
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="progressFill"></div>
        </div>
        <p class="upload-progress-text" id="progressText">上传中...</p>
      </div>
    </section>

    <!-- 筛选标签 -->
    <section class="filter-section" id="filterSection" style="display:none;">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="image">📷 照片</button>
        <button class="filter-tab" data-filter="video">🎬 视频</button>
        <!-- 分类标签由 JS 动态生成 -->
      </div>
      <button class="manage-cat-btn" id="manageCatBtn" title="管理分类">🏷️ 分类</button>
    </section>

    <!-- 分类管理弹出层 -->
    <div class="cat-manager-overlay" id="catManagerOverlay" style="display:none;">
      <div class="cat-manager">
        <h3>🏷️ 管理分类</h3>
        <p class="cat-manager-desc">创建分类帮助整理照片和视频，任何人都可以操作</p>
        <div class="cat-list" id="catList"></div>
        <div class="cat-add-row">
          <input type="text" id="newCatName" placeholder="输入分类名称，如：周杰伦、跨年..." maxlength="20">
          <input type="color" id="newCatColor" value="#ff6b9d" title="选择颜色">
          <button id="addCatBtn">＋ 添加</button>
        </div>
        <button class="cat-close-btn" id="catCloseBtn">完成</button>
      </div>
    </div>

    <!-- 画廊 -->
    <section class="gallery-section">
      <div class="gallery-grid" id="galleryGrid"></div>
      <!-- 空状态 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎬</div>
        <h3>还没有上传任何内容</h3>
        <p>把你的演唱会照片和视频分享上来吧！</p>
      </div>
    </section>
  </main>

  <!-- 图片灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
      <div class="lightbox-info" id="lightboxInfo"></div>
    </div>
  </div>

  <!-- 视频播放器 -->
  <div class="video-modal" id="videoModal">
    <button class="lightbox-close" id="videoClose">&times;</button>
    <div class="video-content">
      <video id="videoPlayer" controls></video>
      <div class="lightbox-info" id="videoInfo"></div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <footer class="footer">
    <p>🎵 演唱会记忆收集站 · 用光影留住感动</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
